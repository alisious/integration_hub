name: .NET CI (IntegrationHub.Api)

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Trentum.sln

      - name: Build
        run: dotnet build Trentum.sln -c Release --no-restore

      - name: Test
        run: dotnet test Trentum.sln -c Release --no-build

